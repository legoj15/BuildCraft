plugins {
    id 'net.neoforged.moddev' version '2.0.140' apply false
}

allprojects {
    apply plugin: 'java'

    java.toolchain.languageVersion = JavaLanguageVersion.of(21)

    repositories {
        mavenLocal()
        maven { url = 'https://maven.neoforged.net/releases' }
        maven { url = 'https://maven.blamejared.com' }
        mavenCentral()
    }
}

subprojects {
    apply plugin: 'net.neoforged.moddev'

    neoForge {
        version = '21.11.38-beta'

        // Load access transformers from any subproject that has the file
        def atFile = project.file('src/main/resources/META-INF/accesstransformer.cfg')
        if (atFile.exists()) {
            accessTransformers.from(atFile)
        }
    }

    dependencies {

    }
}

// ─── Split-Package Checker ───────────────────────────────────────────────────
// Ensures no two subprojects export the same Java package.
// This prevents java.lang.module.ResolutionException at runtime.
def modulePackagePrefixes = [
    'buildcraft-api' : 'buildcraft.api.',
    'buildcraft-lib' : 'buildcraft.lib.',
    'buildcraft-core': 'buildcraft.core.',
    'buildcraft-builders': 'buildcraft.builders.',
    'buildcraft-energy': 'buildcraft.energy.',
    'buildcraft-factory': 'buildcraft.factory.',
    'buildcraft-transport': 'buildcraft.transport.',
    'buildcraft-silicon': 'buildcraft.silicon.',
    'buildcraft-robotics': 'buildcraft.robotics.',
]

tasks.register('checkSplitPackages') {
    group = 'verification'
    description = 'Checks that no Java file declares a package belonging to another subproject.'

    doLast {
        def errors = []

        subprojects.each { proj ->
            def expectedPrefix = modulePackagePrefixes[proj.name]
            if (expectedPrefix == null) return // unknown subproject, skip

            proj.sourceSets.main.java.srcDirs.each { srcDir ->
                if (!srcDir.exists()) return
                fileTree(srcDir).matching { include '**/*.java' }.each { javaFile ->
                    javaFile.readLines().each { line ->
                        def m = (line =~ /^\s*package\s+([\w.]+)\s*;/)
                        if (m) {
                            def pkg = m[0][1] + '.'
                            if (!pkg.startsWith(expectedPrefix)) {
                                errors << "[${proj.name}] ${javaFile.relativePath(srcDir)} declares 'package ${m[0][1]}' — expected '${expectedPrefix}*'"
                            }
                        }
                    }
                }
            }
        }

        if (!errors.isEmpty()) {
            throw new GradleException(
                "Split-package violations detected!\n" +
                errors.collect { "  ✗ ${it}" }.join('\n') +
                "\n\nFix the package declarations above so each module only uses its own namespace."
            )
        } else {
            logger.lifecycle("✓ No split-package violations found.")
        }
    }
}

// Wire the checker to run before compileJava on every subproject
subprojects {
    tasks.named('compileJava') {
        dependsOn rootProject.tasks.named('checkSplitPackages')
    }
}
