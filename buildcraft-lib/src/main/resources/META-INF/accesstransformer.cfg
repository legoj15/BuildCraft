# BuildCraft Access Transformer for NeoForge 1.21.11
# Opens internal recipe fields for guide book recipe display

# ShapedRecipe — pattern is already AT'd by NeoForge; we need result
public net.minecraft.world.item.crafting.ShapedRecipe result # result

# ShapelessRecipe — need result and ingredients
public net.minecraft.world.item.crafting.ShapelessRecipe result # result
public net.minecraft.world.item.crafting.ShapelessRecipe ingredients # ingredients

# SingleItemRecipe — contains result for all cooking/smelting recipes
public net.minecraft.world.item.crafting.SingleItemRecipe result # result
public net.minecraft.world.item.crafting.SingleItemRecipe input # input

# AbstractCookingRecipe — try input field (may be 'ingredient' or 'input')
public net.minecraft.world.item.crafting.AbstractCookingRecipe input # input
