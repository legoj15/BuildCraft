# Properties from NeoForge 26.1 MDK
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# Minecraft and NeoForge versions
minecraft_version=26.1.2
neo_version=26.1.2.70-beta

# Mod Properties
# Axis A — the mod's OWN version (CalVer: YYYY.RELEASE.PATCH). This is a port/fork, not a
# continuation of BuildCraft, so it tracks its own clock rather than impersonating BC's 8.0.0.
# The Minecraft target (Axis B) is appended to the jar FILENAME as +mc<minecraft_version> in
# build.gradle and kept OUT of this string on purpose: NeoForge compares versions Maven-style
# (DefaultArtifactVersion), where a '+...' suffix is a sorting qualifier rather than ignored
# SemVer build-metadata — so update-check and versionRange order strictly by the mod's evolution.
mod_version=2026.1.0

# Dependencies
jei_version=29.5.0.26
