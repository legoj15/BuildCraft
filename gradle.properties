# Properties from NeoForge 26.1 MDK
org.gradle.jvmargs=-Xmx3G
org.gradle.daemon=false

# Minecraft and NeoForge versions
# This branch targets the MC 26.1.0 / 26.1.1 line, which ships the legacy
# server-side BlockEvent.BreakEvent. NeoForge 26.1.2.21-beta replaced it with
# BreakBlockEvent (PR #3064), so this build deliberately stays below that and is
# mutually exclusive with the 26.1.2 build (mods.toml caps it at [26.1.0,26.1.2)).
#
# Compiled against MC 26.1.1 (the newer of the two target hotfixes) because JEI
# never shipped a 26.1.0 build — only 26.1.1 and 26.1.2 exist on the mezz maven.
# The source only uses APIs present since 26.1.0, so the jar still loads and runs
# on 26.1.0; JEI is simply absent there (no 26.1.0 JEI build exists for anyone).
minecraft_version=26.1.1
neo_version=26.1.1.15-beta

#Intentionally different and unjoined from the current minecraft version
mod_version=2026.1.0-rc1

# Dependencies
# Newest JEI published for MC 26.1.1 (no 26.1.0 build exists; 26.1.2 uses 29.5.x+).
jei_version=29.4.0.23
