modLoader="javafml"
loaderVersion="[2,]"
license="MPL-2.0"
issueTrackerURL="https://github.com/legoj15/BuildCraft/issues"

[[mods]]
modId="buildcraftunofficial"
version="${mod_version}"
displayName="BuildCraft (Unofficial)"
logoFile="logo.png"
credits="Created by SpaceToad"
authors="SpaceToad, BuildCraft Team, legoj15 (1.21.11+ port)"
description='''
Extending Minecraft with pipes, auto-crafting, quarries, engines and much more!
Unofficial port to NeoForge.
'''
displayURL="https://github.com/legoj15/BuildCraft"
updateJSONURL="https://raw.githubusercontent.com/legoj15/BuildCraft/26.1.x/BuildCraftVersions.json"

[[dependencies.buildcraftunofficial]]
    modId="neoforge"
    type="required"
    # This build uses the legacy server-side BlockEvent.BreakEvent (BlockUtil/
    # LocalBlockUpdateNotifier); NeoForge 26.1.2.21-beta replaced it with
    # BreakBlockEvent. Cap below the 26.1.2 line so this jar never loads where
    # the old class is gone (the 26.1.2 build covers that line instead).
    versionRange="[26.1.0,26.1.2)"
    ordering="NONE"
    side="BOTH"

[[dependencies.buildcraftunofficial]]
    modId="minecraft"
    type="required"
    versionRange="[26.1.0,26.1.2)"
    ordering="NONE"
    side="BOTH"
