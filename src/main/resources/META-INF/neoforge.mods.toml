modLoader="javafml"
loaderVersion="[2,]"
license="MPL-2.0"
issueTrackerURL="https://github.com/legoj15/BuildCraft/issues"

[[mods]]
modId="buildcraftunofficial"
version="${mod_version}"
displayName="BuildCraft (Unofficial)"
logoFile="logo.png"
credits="Created by SpaceToad"
authors="SpaceToad, BuildCraft Team, legoj15 (1.21.1+ port)"
description='''
Extending Minecraft with pipes, auto-crafting, quarries, engines and much more!
Unofficial port to NeoForge.
'''
displayURL="https://github.com/legoj15/BuildCraft"
updateJSONURL="https://raw.githubusercontent.com/legoj15/BuildCraft/${update_branch}/BuildCraftVersions.json"

[[dependencies.buildcraftunofficial]]
    modId="neoforge"
    type="required"
    # Range is per Stonecutter node (see gradle.properties / versions/<node>/gradle.properties).
    # On the 26.1.2 node the floor is 26.1.2.21-beta, where BreakBlockEvent (used by
    # BlockUtil/LocalBlockUpdateNotifier) was added; the 26.1.x node uses BlockEvent.BreakEvent
    # and a [26.1.0,26.1.2) range instead.
    versionRange="${neo_dep_range}"
    ordering="NONE"
    side="BOTH"

[[dependencies.buildcraftunofficial]]
    modId="minecraft"
    type="required"
    versionRange="${mc_dep_range}"
    ordering="NONE"
    side="BOTH"
